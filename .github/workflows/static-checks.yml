name: Static checks

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install checks
        run: python -m pip install -r requirements.txt
      - name: Validate site content
        run: python -m pytest -q

